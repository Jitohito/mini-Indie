     <script>
document.querySelectorAll('[data-file]').forEach(async (element) => {
    const archivo = element.dataset.file;

    try {
        const respuesta = await fetch(archivo);
        const contenido = await respuesta.text();
        element.innerHTML = contenido;
    } catch {
        element.innerHTML = "Error cargando artículo.";
    }
});
</script>
